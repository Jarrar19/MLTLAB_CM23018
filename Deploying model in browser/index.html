<!DOCTYPE html>
<html>
<head>
  <title>ML Model Deployment (Working)</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #121212;
      color: white;
    }

    button, input {
      margin: 10px;
      padding: 10px;
      font-size: 16px;
    }

    #status {
      margin-top: 15px;
      color: lightgreen;
    }
  </style>
</head>

<body>

<h2>🧠 ML Model in Browser (Correct Version)</h2>

<input type="number" id="input" placeholder="Enter number (e.g. 5)">
<br>

<button onclick="train()">Train</button>
<button onclick="save()">Save</button>
<button onclick="load()">Load</button>
<button onclick="predict()">Predict</button>

<h3 id="result">Output: --</h3>
<p id="status">Status: Ready</p>

<script>
let model;

// Create model
function createModel() {
  const m = tf.sequential();
  m.add(tf.layers.dense({ units: 1, inputShape: [1] }));
  m.compile({
    optimizer: tf.train.sgd(0.1),
    loss: 'meanSquaredError'
  });
  return m;
}

// Train model
async function train() {
  document.getElementById("status").innerText = "Training...";

  model = createModel();

  const xs = tf.tensor2d([1,2,3,4,5], [5,1]);
  const ys = tf.tensor2d([2,4,6,8,10], [5,1]);

  await model.fit(xs, ys, {
    epochs: 200,
    callbacks: {
      onEpochEnd: (epoch, logs) => {
        console.log("Epoch:", epoch, "Loss:", logs.loss);
      }
    }
  });

  console.log("Model Trained ✅");
  document.getElementById("status").innerText = "Model Trained ✅";
}

// Save model
async function save() {
  if (!model) {
    alert("Train model first!");
    return;
  }

  await model.save("localstorage://my-model");
  console.log("Model Saved 💾");

  document.getElementById("status").innerText = "Model Saved 💾";
}

// Load model
async function load() {
  try {
    model = await tf.loadLayersModel("localstorage://my-model");
    console.log("Model Loaded 🔄");

    document.getElementById("status").innerText = "Model Loaded 🔄";
  } catch (e) {
    alert("No saved model found!");
  }
}

// Predict
async function predict() {
  if (!model) {
    alert("Train or load model first!");
    return;
  }

  const val = document.getElementById("input").value;

  if (val === "") {
    alert("Enter a value!");
    return;
  }

  const input = tf.tensor2d([Number(val)], [1,1]);

  const output = model.predict(input);
  const result = await output.data();

  console.log("Prediction:", result[0]);

  document.getElementById("result").innerText =
    "Output: " + result[0].toFixed(2);

  document.getElementById("status").innerText = "Prediction Done ✅";
}
</script>

</body>
</html>
